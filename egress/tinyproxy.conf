User nobody
Group nobody
Port 8888
Listen 0.0.0.0
Timeout 600
MaxClients 100
LogLevel Info
LogFile "/tmp/tinyproxy.log"
PidFile "/tmp/tinyproxy.pid"

# Only clients on the internal experiment network can reach us at all.
Allow 0.0.0.0/0

# Default-deny domain allowlist. Only hosts matching a pattern in the filter
# file are permitted — for both plain HTTP and HTTPS CONNECT tunnels, matched
# against the request host / CONNECT target. Reloaded on SIGHUP.
Filter "/data/filter.txt"
FilterDefaultDeny Yes
FilterExtended On
FilterCaseSensitive Off
