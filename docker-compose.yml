services:
  ollama:
    image: ollama/ollama:rocm          # ROCm build for the Radeon 8060S (gfx1151)
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    devices:
      - /dev/kfd
      - /dev/dri
    group_add:
      - "991"
      - "44"
    environment:
      - HSA_OVERRIDE_GFX_VERSION=11.5.1
      - HSA_ENABLE_SDMA=0                 # stability fix for unified memory on Strix Halo
      - OLLAMA_MAX_LOADED_MODELS=2        # keep both lab models resident
      - OLLAMA_KEEP_ALIVE=60m             # avoid reload thrash between phases
      - OLLAMA_HOST=0.0.0.0

  postgres:
    image: pgvector/pgvector:pg17
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ailab
      POSTGRES_USER: ailab
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ailab}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@ailab.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres

volumes:
  ollama:
  postgres_data:
  pgadmin_data:
