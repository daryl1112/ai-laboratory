services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    # For NVIDIA GPUs, uncomment:
    # deploy:
    #   resources:
    #     reservations:
    #       devices: [{ capabilities: ["gpu"] }]

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      - ollama
    volumes:
      # Trusted backend talks to the host daemon to create sibling experiment
      # containers. Experiment containers themselves never get this socket.
      - /var/run/docker.sock:/var/run/docker.sock
      # Bind the experiments folder at the SAME absolute path inside the
      # container so sibling-container volume binds resolve correctly on the host.
      - ${LAB_ROOT}/experiments:${LAB_ROOT}/experiments
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - ARCHITECT_MODEL=${ARCHITECT_MODEL:-qwen2.5-coder:7b}
      - EXPERIMENTS_DIR=${LAB_ROOT}/experiments
      - DB_PATH=/app/lab.db
      - CORS_ORIGINS=http://localhost:3000
      - CONTAINER_NETWORK=none
      - LLM_CODEGEN=true

  ui:
    build:
      context: ./ui
      args:
        NEXT_PUBLIC_API_BASE: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  ollama:
